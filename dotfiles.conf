#!/usr/bin/env bash
# Shared configuration for setup.sh and uninstall.sh

export DOTFILES_PATH="$HOME/.dotfiles"

# Files symlinked from $DOTFILES_PATH/<name> -> $HOME/<name>
home_dotfiles=(
  .aliases
  .bashrc
  .ctags
  .curlrc
  .editorconfig
  .exports
  .functions
  .gitconfig
  .hushlogin
  .inputrc
  .npmrc
  .osx
  .shrc
  .spacemacs
  .sshrc
  .tmux.conf
  .vim
  .vimrc
  .wgetrc
  .zprofile
  .zshenv
  .zshrc
)

# Directories symlinked from $DOTFILES_PATH/.config/<name> -> $HOME/.config/<name>
config_dirs=(
  delta
  ghostty
  helix
  kitty
  litellm
  mise
  neovide
  ranger
  yamllint
  yazi
  zed
  zellij
)
