# =============================================================================
# Kitty Terminal — matched to iTerm2 profile (Honukai)
# =============================================================================

# Font (iTerm2: FiraMono Nerd Font Mono, Regular, size 13)
font_family      FiraMono Nerd Font Mono
bold_font        FiraMono Nerd Font Mono Bold
italic_font      FiraMono Nerd Font Mono Italic
bold_italic_font FiraMono Nerd Font Mono Bold Italic
font_size        13.0
disable_ligatures never

# Spacing (iTerm2: horizontal 0.9, vertical 0.99)
adjust_line_height  99%
adjust_column_width 90%

# Cursor (iTerm2: block, no blink, smart color)
cursor_shape          block
cursor_blink_interval 0
cursor_text_color     #111625

# Scrollback (iTerm2: unlimited)
scrollback_lines 100000

# Mouse
url_color #0645AD
url_style single

# Bell (iTerm2: visual bell, no audio)
enable_audio_bell no
visual_bell_duration 0.1

# Window
window_padding_width    0
hide_window_decorations titlebar-only
confirm_os_window_close 2

# Tab bar (iTerm2 compact style — non-native, top)
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_bar_margin_width    0.0
tab_bar_margin_height   8.0 0.0
tab_title_template      " {index}: {title} "

active_tab_foreground   #BBBCC8
active_tab_background   #111625
active_tab_font_style   bold
inactive_tab_foreground #7A7D8A
inactive_tab_background #0D1017
inactive_tab_font_style normal
tab_bar_background      #0D1017

# macOS
macos_titlebar_color                background
macos_option_as_alt                 left
macos_quit_when_last_window_closed  no

# Remote control (required for beckon terminal focus switching)
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}

# Shell & terminal (iTerm2: xterm-256color)
term xterm-256color

# =============================================================================
# Colors — Honukai theme (extracted from iTerm2 profile)
# =============================================================================

foreground           #BBBCC8
background           #111625
cursor               #FFFFFF
selection_foreground  #FFFFFF
selection_background  #2E3758

# Normal colors
color0  #000000
color1  #DD4F30
color2  #6CBE3A
color3  #E6D72C
color4  #2670FC
color5  #F258B9
color6  #38B2DA
color7  #BBBBBB

# Bright colors
color8  #555555
color9  #E17F64
color10 #7FBA5A
color11 #FFFF55
color12 #5C8FF3
color13 #FA83C1
color14 #78CEE7
color15 #FFFFFF

# =============================================================================
# Key mappings
# =============================================================================

# Tab management
map cmd+t       new_tab
map cmd+w       close_tab
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9

# Window (split) management
map cmd+d       new_window
map cmd+shift+d close_window

# Word movement (iTerm2: Option+arrows)
map alt+left  send_text all \x1bb
map alt+right send_text all \x1bf

# Scrollback
map cmd+k send_text all \x0b

# Font size
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0     change_font_size all 0
